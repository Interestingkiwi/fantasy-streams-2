<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Prep - Fantasy Streams</title>
    <script src="{{ url_for('static', filename='tailwind.js') }}"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .form-input, .form-select {
            background-color: #2D2D2D;
            color: #D4D4D4;
            border: 1px solid #555;
        }
        .form-input::placeholder { color: #888; }
        .btn-primary { background-color: #0E639C; color: white; }
        .btn-primary:hover { background-color: #1177BB; }
        .hidden { display: none; }

        /* Table row hover effect */
        .table-row-hover:hover { background-color: #374151; }
    </style>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
</head>
<body class="bg-gray-900 text-gray-200 flex flex-col min-h-screen">

    <header class="bg-gray-800 shadow-md p-4 border-b border-gray-700 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white tracking-wide">Draft Prep Dashboard</h1>
        <a href="/" class="text-blue-400 hover:text-blue-300 transition-colors text-sm font-medium">Back to Home</a>
    </header>

    <main class="flex-grow container mx-auto p-4 md:p-6 flex flex-col gap-6">

        <section class="bg-gray-800 p-6 rounded-lg shadow-xl border border-gray-700">
            <div class="flex justify-between items-end mb-4 border-b border-gray-700 pb-2">
                <div>
                    <h2 class="text-xl font-semibold text-white">League Settings</h2>
                    <p class="text-gray-400 text-sm mt-1">Select the scoring categories used in your league to adjust projections.</p>
                </div>
                <button class="btn-primary px-4 py-2 rounded-md text-sm font-medium transition-colors">Apply Settings</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mt-4">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" checked class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-600">
                    <span class="text-sm font-medium text-gray-300">Goals (G)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" checked class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-600">
                    <span class="text-sm font-medium text-gray-300">Assists (A)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" checked class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-600">
                    <span class="text-sm font-medium text-gray-300">Points (PTS)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" checked class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-600">
                    <span class="text-sm font-medium text-gray-300">Shots (SOG)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" checked class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-600">
                    <span class="text-sm font-medium text-gray-300">Powerplay Pts (PPP)</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-600">
                    <span class="text-sm font-medium text-gray-300">Hits (HIT)</span>
                </label>
                </div>
        </section>

        <section class="bg-gray-800 p-4 rounded-lg shadow-xl border border-gray-700 flex flex-col lg:flex-row justify-between items-center gap-4">

            <div class="flex flex-wrap gap-4 w-full lg:w-auto">
                <input type="text" placeholder="Search player name..." class="form-input p-2 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm w-full md:w-48">

                <select class="form-select p-2 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm">
                    <option value="">All Positions</option>
                    <option value="C">Center (C)</option>
                    <option value="LW">Left Wing (LW)</option>
                    <option value="RW">Right Wing (RW)</option>
                    <option value="D">Defense (D)</option>
                    <option value="G">Goalie (G)</option>
                </select>

                <select class="form-select p-2 rounded-md focus:ring-blue-500 focus:border-blue-500 text-sm">
                    <option value="">All Teams</option>
                    <option value="TOR">TOR</option>
                    <option value="EDM">EDM</option>
                    <option value="COL">COL</option>
                    </select>
            </div>

            <div class="flex flex-wrap gap-2 w-full lg:w-auto justify-end">
                <button class="bg-emerald-700 hover:bg-emerald-600 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
                    Add to Favourites
                </button>
                <button class="bg-red-800 hover:bg-red-700 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
                    Add to DND
                </button>
                <button class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors border border-gray-500">
                    Export List
                </button>
            </div>

        </section>

        <section class="bg-gray-800 rounded-lg shadow-xl border border-gray-700 overflow-hidden flex-grow">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-900 border-b border-gray-700">
                        <tr>
                            <th class="p-4 w-12 text-center">
                                <input type="checkbox" id="select-all" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-600">
                            </th>
                            <th class="p-4 text-sm font-semibold text-gray-300 cursor-pointer hover:text-white">Player</th>
                            <th class="p-4 text-sm font-semibold text-gray-300 cursor-pointer hover:text-white">Team</th>
                            <th class="p-4 text-sm font-semibold text-gray-300 cursor-pointer hover:text-white">Pos</th>
                            <th class="p-4 text-sm font-semibold text-gray-300 cursor-pointer hover:text-white text-right">G</th>
                            <th class="p-4 text-sm font-semibold text-gray-300 cursor-pointer hover:text-white text-right">A</th>
                            <th class="p-4 text-sm font-semibold text-gray-300 cursor-pointer hover:text-white text-right">PTS</th>
                            <th class="p-4 text-sm font-semibold text-gray-300 cursor-pointer hover:text-white text-right">SOG</th>
                            <th class="p-4 text-sm font-semibold text-gray-300 cursor-pointer hover:text-white text-right">PPP</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-gray-700">
                        <tr class="table-row-hover transition-colors">
                            <td class="p-4 text-center">
                                <input type="checkbox" class="player-checkbox w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-600">
                            </td>
                            <td class="p-4 font-medium text-white">Connor McDavid</td>
                            <td class="p-4 text-gray-400">EDM</td>
                            <td class="p-4 text-gray-400">C</td>
                            <td class="p-4 text-right text-gray-300">45</td>
                            <td class="p-4 text-right text-gray-300">95</td>
                            <td class="p-4 text-right font-bold text-emerald-400">140</td>
                            <td class="p-4 text-right text-gray-300">310</td>
                            <td class="p-4 text-right text-gray-300">60</td>
                        </tr>
                        <tr class="table-row-hover transition-colors">
                            <td class="p-4 text-center">
                                <input type="checkbox" class="player-checkbox w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-600 focus:ring-blue-600">
                            </td>
                            <td class="p-4 font-medium text-white">Auston Matthews</td>
                            <td class="p-4 text-gray-400">TOR</td>
                            <td class="p-4 text-gray-400">C</td>
                            <td class="p-4 text-right text-gray-300">60</td>
                            <td class="p-4 text-right text-gray-300">45</td>
                            <td class="p-4 text-right font-bold text-emerald-400">105</td>
                            <td class="p-4 text-right text-gray-300">340</td>
                            <td class="p-4 text-right text-gray-300">35</td>
                        </tr>
                        </tbody>
                </table>
            </div>

            <div class="bg-gray-800 p-4 border-t border-gray-700 flex justify-between items-center text-sm text-gray-400">
                <span>Showing 1 to 50 of 800 players</span>
                <div class="space-x-2">
                    <button class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600 transition-colors text-white">Previous</button>
                    <button class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600 transition-colors text-white">Next</button>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
